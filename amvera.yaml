meta:
  environment: csharp
  toolchain:
    name: dotnet
    version: 8.0

build:
  image: mcr.microsoft.com/dotnet/sdk:8.0
  type: dotnet
  solutionFile: Back/Back.sln  # исправленный параметр
  publish: true
  configuration: Release
  framework: net8.0

run:
  persistenceMount: /data
  image: mcr.microsoft.com/dotnet/aspnet:8.0  # используйте aspnet для запуска
  containerPort: 8080
  servicePort: 80
  command: dotnet Back/bin/Release/net8.0/Back.dll  # команда запуска приложения
