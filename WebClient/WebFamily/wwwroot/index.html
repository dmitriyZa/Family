<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebFamily</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="_content/Blazor.Bootstrap/blazor.bootstrap.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WebFamily.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
    <!-- Стиль для эффекта плавного мерцания скелетона -->
    <style>
        .skeleton-loading .placeholder {
            background-color: #e9ecef;
            border-radius: 4px;
        }
        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        .shimmer-effect {
            animation: shimmer 1.5s infinite ease-in-out;
        }
    </style>

    <div class="skeleton-loading shimmer-effect d-flex flex-column vh-100 bg-light">
        <!-- 1. Верхняя панель (Navbar) -->
        <header class="navbar navbar-dark bg-dark px-4 border-bottom shadow-sm" style="height: 56px;">
            <div class="placeholder col-2 bg-secondary opacity-50" style="height: 24px; min-width: 120px;"></div>
            <div class="rounded-circle bg-secondary opacity-50" style="width: 32px; height: 32px;"></div>
        </header>

        <div class="d-flex flex-grow-1">
            <!-- 2. Боковое меню (Sidebar) -->
            <aside class="bg-white border-end d-none d-md-block" style="width: 250px;">
                <div class="p-3 d-flex flex-column gap-3">
                    <div class="placeholder col-9" style="height: 35px;"></div>
                    <div class="placeholder col-11" style="height: 35px;"></div>
                    <div class="placeholder col-8" style="height: 35px;"></div>
                    <div class="placeholder col-10" style="height: 35px;"></div>
                </div>
            </aside>

            <!-- 3. Основной контент страницы -->
            <main class="flex-grow-1 p-4 overflow-hidden">
                <!-- Хлебные крошки / Заголовок -->
                <div class="placeholder col-4 col-md-3 mb-4 bg-secondary opacity-25" style="height: 32px;"></div>

                <!-- Карточка-контейнер -->
                <div class="card border-0 shadow-sm p-4 bg-white">
                    <div class="d-flex flex-column gap-3">
                        <div class="placeholder col-7" style="height: 20px;"></div>
                        <div class="placeholder col-12" style="height: 15px;"></div>
                        <div class="placeholder col-10" style="height: 15px;"></div>
                        
                        <!-- Имитация таблицы или сетки данных -->
                        <div class="row g-3 mt-3">
                            <div class="col-4"><div class="placeholder col-12" style="height: 80px;"></div></div>
                            <div class="col-4"><div class="placeholder col-12" style="height: 80px;"></div></div>
                            <div class="col-4"><div class="placeholder col-12" style="height: 80px;"></div></div>
                        </div>
                        
                        <div class="placeholder col-5 mt-3" style="height: 15px;"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>



    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <!-- Add chart.js reference if chart components are used in your application. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.0.1/chart.umd.js" integrity="sha512-gQhCDsnnnUfaRzD8k1L5llCCV6O9HN09zClIzzeJ8OJ9MpGmIlCxm+pdCkqTwqJ4JcjbojFr79rl2F1mzcoLMQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Add chartjs-plugin-datalabels.min.js reference if chart components with data label feature is used in your application. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js" integrity="sha512-JPcRR8yFa8mmCsfrw4TNte1ZvF1e3+1SdGMslZvmrzDYxS69J7J49vkFL8u6u8PlPJK+H3voElBtUCzaXj+6ig==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Add sortable.js reference if SortableList component is used in your application. -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="script/treeInterop.js"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
</body>

</html>
