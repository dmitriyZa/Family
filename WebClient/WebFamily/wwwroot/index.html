<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebFamily</title>
    <base href="/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="_content/Blazor.Bootstrap/blazor.bootstrap.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WebFamily.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <!-- Имитация верхней панели (Navbar) -->
        <div class="navbar navbar-dark bg-dark px-4" style="height: 56px;">
            <span class="navbar-brand mb-0 h1 opacity-50">Загрузка...</span>
        </div>

        <div class="d-flex" style="height: calc(100vh - 56px);">
            <!-- Имитация бокового меню (Sidebar) -->
            <div class="bg-light border-end" style="width: 250px; flex-shrink: 0;">
                <div class="list-group list-group-flush p-3">
                    <div class="placeholder col-8 mb-3 bg-secondary opacity-25" style="height: 20px;"></div>
                    <div class="placeholder col-10 mb-3 bg-secondary opacity-25" style="height: 20px;"></div>
                    <div class="placeholder col-6 mb-3 bg-secondary opacity-25" style="height: 20px;"></div>
                </div>
            </div>
            <!-- Имитация основного контента -->
            <div class="flex-grow-1 p-4 bg-white">
                <div class="placeholder-glow">
                    <span class="placeholder col-7 bg-secondary opacity-25 d-block mb-4" style="height: 40px;"></span>
                    <span class="placeholder col-12 bg-secondary opacity-25 d-block mb-2"></span>
                    <span class="placeholder col-12 bg-secondary opacity-25 d-block mb-2"></span>
                    <span class="placeholder col-4 bg-secondary opacity-25 d-block"></span>
                </div>
            </div>
        </div>
    </div>


    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <!-- Add chart.js reference if chart components are used in your application. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.0.1/chart.umd.js" integrity="sha512-gQhCDsnnnUfaRzD8k1L5llCCV6O9HN09zClIzzeJ8OJ9MpGmIlCxm+pdCkqTwqJ4JcjbojFr79rl2F1mzcoLMQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Add chartjs-plugin-datalabels.min.js reference if chart components with data label feature is used in your application. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js" integrity="sha512-JPcRR8yFa8mmCsfrw4TNte1ZvF1e3+1SdGMslZvmrzDYxS69J7J49vkFL8u6u8PlPJK+H3voElBtUCzaXj+6ig==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Add sortable.js reference if SortableList component is used in your application. -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="script/treeInterop.js"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
</body>

</html>
