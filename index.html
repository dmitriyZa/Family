<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebFamily</title>
    <base href="/Family/" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="_content/Blazor.Bootstrap/blazor.bootstrap.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="WebFamily.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
    <!-- Стили вашей главной страницы, адаптированные для экрана загрузки -->
    <style>
        .welcome-container-loading {
            animation: fadeIn 0.6s ease-out;
        }

        .family-image-card-loading {
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* Тонкий индикатор загрузки на самом верху, адаптированный под ваш фиолетовый цвет */
        .top-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, #712cf9, #9b51e0, #712cf9);
            background-size: 200% 100%;
            z-index: 9999;
            animation: loading-animation 1.5s linear infinite;
        }

        @keyframes loading-animation {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Поддержка темной темы, если она включена в браузере */
        @media (prefers-color-scheme: dark) {
            .bg-loading-screen { background-color: #121212 !important; color: #f8f9fa !important; }
            .text-dark-loading { color: #f8f9fa !important; }
            .family-image-card-loading { background-color: #1e1e1e !important; border-color: rgba(255, 255, 255, 0.05); }
        }
    </style>

    <!-- Тонкая фиолетовая полоска прогресса сверху -->
    <div class="top-loading-bar"></div>

    <!-- Статический макет вашей страницы -->
    <div class="bg-loading-screen container-fluid py-5 vh-100 d-flex flex-column justify-content-center" style="background-color: #f8f9fa;">
        <div class="welcome-container-loading">
            
            <!-- Заголовок -->
            <div class="text-center mb-5">
                <h1 class="display-5 fw-bold text-dark text-dark-loading mb-2">Добро пожаловать в Семейный Архив</h1>
                <p class="text-muted fst-italic fs-5">Храните историю и традиции вашего рода в одном месте</p>
            </div>

            <!-- Контейнер для фото (картинка загрузится стандартными средствами браузера сразу) -->
            <div class="d-flex justify-content-center">
                <div class="family-image-card-loading shadow-sm rounded-4 overflow-hidden bg-white">
                    <img src="./sample-data/family.png" class="img-fluid d-block" alt="Семейная фотография" />
                </div>
            </div>

        </div>
    </div>
</div>




    <script src="_framework/blazor.webassembly.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
    <!-- Add chart.js reference if chart components are used in your application. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.0.1/chart.umd.js" integrity="sha512-gQhCDsnnnUfaRzD8k1L5llCCV6O9HN09zClIzzeJ8OJ9MpGmIlCxm+pdCkqTwqJ4JcjbojFr79rl2F1mzcoLMQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Add chartjs-plugin-datalabels.min.js reference if chart components with data label feature is used in your application. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js" integrity="sha512-JPcRR8yFa8mmCsfrw4TNte1ZvF1e3+1SdGMslZvmrzDYxS69J7J49vkFL8u6u8PlPJK+H3voElBtUCzaXj+6ig==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <!-- Add sortable.js reference if SortableList component is used in your application. -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="script/treeInterop.js"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
</body>

</html>
